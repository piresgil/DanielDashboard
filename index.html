<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>DanielDashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
    }
    .categoria {
      margin-top: 40px;
    }
    .noticia {
      background: #222;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
    }
    a {
      color: #4da3ff;
      text-decoration: none;
    }
  </style>
</head>
<body>

<h1>DanielDashboard</h1>

<div id="conteudo">A carregar notícias...</div>

<script>
  fetch("news.json")
    .then(r => r.json())
    .then(data => {
      let html = "";

      for (const categoria in data) {
        html += `<div class='categoria'><h2>${categoria.toUpperCase()}</h2>`;
        data[categoria].forEach(n => {
          html += `
            <div class='noticia'>
              <strong>${n.titulo}</strong><br>
              <a href="${n.link}" target="_blank">${n.fonte}</a>
            </div>
          `;
        });
        html += "</div>";
      }

      document.getElementById("conteudo").innerHTML = html;
    })
    .catch(err => {
      document.getElementById("conteudo").innerHTML = "Erro ao carregar notícias.";
    });
</script>

</body>
</html>
